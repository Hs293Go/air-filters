name: Rust CI & Publish

on:
  push:
    branches: ["main"]
    # Trigger the publish job when pushing a version tag, e.g., `git tag v0.1.0 && git push origin v0.1.0`
    tags: ["v*"]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: no_std (thumbv7em)
            target: thumbv7em-none-eabihf
            features: "libm"
            no_run: true
          - name: std (host)
            target: x86_64-unknown-linux-gnu
            features: "std"
            no_run: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cargo Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key:
            ${{ runner.os }}-cargo-${{ matrix.name }}-${{
            hashFiles('**/Cargo.lock') }}

      - name: Check (Clippy)
        run:
          cargo clippy --target ${{ matrix.target }} --no-default-features
          --features "${{ matrix.features }}" -- -D warnings

      - name: Build
        run:
          cargo build --target ${{ matrix.target }} --no-default-features
          --features "${{ matrix.features }}"

      - name: Run Tests
        if: ${{ !matrix.no_run }}
        run: cargo test --features "${{ matrix.features }}"

  publish:
    name: Publish Crate
    needs: test # Ensures this job only runs if the 'test' job matrix passes
    runs-on: ubuntu-latest
    # Only run this job if the push was a tag starting with 'v'
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish
